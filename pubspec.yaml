name: aladin_iptv_pro
description: Aladin Media Player Pro TV — High-Performance Android TV Media Player
publish_to: 'none'
version: 2.2.0+29

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ── Database ──────────────────────────────────────────────────────────────
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.3

  # ── Network ───────────────────────────────────────────────────────────────
  http: ^1.2.1
  cached_network_image: ^3.3.1 

  # ── File ──────────────────────────────────────────────────────────────────
  file_picker: ^8.0.6
  permission_handler: ^12.0.1

  # ── XML + GZ (EPG) ────────────────────────────────────────────────────────
  xml: ^6.5.0
  archive: ^3.6.1

  # ── UI ────────────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # ── State ─────────────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Utils ─────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.1.1
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_community_generator: ^3.3.2
  build_runner: any
  build_runner_core: any
  build_resolvers: any
  flutter_lints: ^3.0.0
  analyzer: ^8.4.1
  flutter_launcher_icons: ^0.13.1 

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/placeholder/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icons/app_logo.png"

dependency_overrides:
  isar_community_flutter_libs: 3.3.2
