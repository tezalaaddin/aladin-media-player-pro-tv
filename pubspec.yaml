name: aladin_iptv_pro
description: Aladin Media Player Pro TV — High-Performance Android TV Media Player
publish_to: 'none'
version: 2.2.0+8

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: 2.3.3+1  # Bu sürümde Baklava uyuşmazlığı yoktur
  # ── Database ──────────────────────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ── Video Player ──────────────────────────────────────────────────────────
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  media_kit_libs_android_video: ^1.3.6
  # ── EXO Video Player ──────────────────────────────────────────────────────────
  video_player: ^2.8.1 # ExoPlayer'ın Flutter ayağı

  # ── Network ───────────────────────────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1
  cached_network_image: ^3.3.1 # Logoları hafızaya almak için şart

  # ── File ──────────────────────────────────────────────────────────────────
  file_picker: ^8.0.6
  permission_handler: ^12.0.1

  # ── XML + GZ (EPG) ────────────────────────────────────────────────────────
  xml: ^6.5.0
  archive: ^3.6.1

  # ── UI ────────────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # ── State ─────────────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Utils ─────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0

  collection: ^1.18.0

    # ── Icon + Logo ─────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  analyzer: ^5.13.0
  flutter_launcher_icons: ^0.13.1 # Uygulama logosunu otomatik oluşturmak için

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/placeholder/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png" # Logonu buraya koy
  min_sdk_android: 21
  adaptive_icon_background: "#121212" # Uygulamanın koyu temasına uygun arka plan
  adaptive_icon_foreground: "assets/icons/app_logo.png"

dependency_overrides:
  isar_flutter_libs: 3.1.0+1 # Or the latest stable version